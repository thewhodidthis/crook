<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>&middot; Crook &middot;</title>
    <link rel="icon" href="data:image/x-icon;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="index.css">
  </head>

  <body>
    <figure>
      <canvas width="640" height="360"><img src="screenshot.png" alt="screenshot.png" /></canvas>

      <figcaption>
        <p><strong>crook.js</strong> Helps do pixel shifting</p>
      </figcaption>
    </figure>

    <noscript><small><em>please enable javascript</em></small></noscript>
    <script id="worker" type="javascript/worker">
      importScripts(location.origin + '/crook.js');

      self.addEventListener('message', function(e) {
        const filter = Crook({
          channel: {
            x: 1,
            y: 0,
          },
          scale: {
            x: 320,
            y: -360,
          },
        });

        self.postMessage({ result: filter(e.data.source, e.data.lookup) });
      });
    </script>
    <script src="index.js"></script>
  </body>
</html>
