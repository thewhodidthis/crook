<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Helps with pixel shifting">
    <title>crook.js</title>
    <link rel="preload" href="index.css" as="style">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <!-- Images from http://sipi.usc.edu/database/database.php -->
    <figure>
      <ul>
        <li>
          <img src="assets/elaine.jpg" height="180" width="180" alt="Original: Elaine">
        </li>
        <li>
          <canvas height="180" width="180" data-src="assets/elaine.jpg">
            <img src="assets/elaine-1.png" height="180" width="180" alt="Screenshot: Elaine processed">
          </canvas>
        </li>
        <li>
          <canvas height="180" width="180" data-src="assets/elaine.jpg">
            <img src="assets/elaine-2.png" height="180" width="180" alt="Screenshot: Elaine processed">
          </canvas>
        </li>
        <li>
          <img src="assets/4.2.07.jpg" height="180" width="180" alt="Original: Peppers">
        </li>
        <li>
          <canvas height="180" width="180" data-src="assets/4.2.07.jpg">
            <img src="assets/4.2.07-1.png" height="180" width="180" alt="Screenshot: Peppers processed">
          </canvas>
        </li>
        <li>
          <canvas height="180" width="180" data-src="assets/4.2.07.jpg">
            <img src="assets/4.2.07-2.png" height="180" width="180" alt="Screenshot: Peppers processed">
          </canvas>
        </li>
      </ul>
      <figcaption>
        <p><strong><a href="https://github.com/thewhodidthis/crook">crook.js</a></strong> Helps with pixel shifting</p>
      </figcaption>
    </figure>
  </body>
</html>
