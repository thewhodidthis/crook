<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&middot; Crook &middot;</title>
    <link rel="icon" href="data:image/x-icon;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <figure>
      <canvas id="canvas" width="640" height="360"></canvas>
      <figcaption>
        <p><strong>crook.js</strong> Helps do pixel shifting</p>
      </figcaption>
    </figure>

    <noscript>please enable javascript</noscript>
    <script id="worker" type="javascript/worker">
      importScripts(location.origin + '/crook.js');

      self.addEventListener('message', function(e) {
        const settings = {
          channel: {
            x: 1,
            y: 0,
          },
          scale: {
            x: 320,
            y: -360,
          },
        };

        const filter = crook(settings);

        self.postMessage({ result: filter(e.data.source, e.data.lookup) });
      });
    </script>
    <script src="index.js"></script>
  </body>
</html>
